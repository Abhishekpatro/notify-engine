global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ingestion-api
    static_configs:
      - targets: ["ingestion-api:8000"]

  - job_name: router
    static_configs:
      - targets: ["router:8001"]

  - job_name: delivery-worker
    static_configs:
      - targets: ["delivery-worker:8002"]
